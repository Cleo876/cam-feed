<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge WebRTC Camera Feeder</title>
    <!-- Tailwind CSS for clean layout styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QR Code Generation and Scanning Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Hidden UI style for clean OBS capture in fullscreen */
        .no-controls::-webkit-media-controls { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

    <!-- Custom Message Box to replace native alerts -->
    <div id="message-box" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/80 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-sm w-full mx-4 shadow-2xl flex flex-col space-y-4 text-center">
            <h3 class="text-xl font-bold text-amber-500">Notice</h3>
            <p id="message-box-text" class="text-zinc-300 text-sm"></p>
            <button onclick="closeMessageBox()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 font-semibold rounded-xl border border-zinc-600 transition">OK</button>
        </div>
    </div>

    <!-- Role Selection Screen -->
    <div id="role-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">
        <h1 class="text-3xl font-bold tracking-tight text-amber-500">WebRTC Camera Feeder</h1>
        <p class="text-zinc-400 text-center max-w-sm text-sm">Select the role for this device to establish the video stream proxy.</p>
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-sm">
            <button onclick="initReceiver()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-750 rounded-xl font-semibold border border-zinc-700 transition shadow-lg">PC / Receiver</button>
            <button onclick="initSender()" class="flex-1 py-4 bg-amber-600 hover:bg-amber-500 text-black rounded-xl font-semibold transition shadow-lg">Phone / Sender</button>
        </div>
    </div>

    <!-- PC / Receiver Interface -->
    <div id="receiver-screen" class="hidden flex-1 flex flex-col p-6 max-w-4xl mx-auto w-full space-y-6">
        <div id="receiver-setup" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 flex flex-col items-center space-y-4 shadow-xl">
            <h2 class="text-xl font-semibold">Scan to Link Camera</h2>
            <div id="qrcode" class="p-3 bg-white rounded-xl"></div>
            <p class="text-xs text-zinc-500 text-center">Session ID: <span id="session-id-display" class="font-mono text-zinc-300">Generating...</span></p>
            <button id="check-answer-btn" onclick="checkForAnswer()" class="px-6 py-2.5 bg-amber-600 hover:bg-amber-500 text-black font-medium rounded-lg transition shadow-lg disabled:opacity-50">Check for Phone Connection</button>
            <p id="receiver-status" class="text-sm text-zinc-400 animate-pulse">Waiting for network candidate aggregation...</p>
        </div>

        <div id="video-container" class="hidden relative bg-black aspect-video rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl group">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover no-controls"></video>
            <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                <button onclick="toggleFullscreen()" class="px-4 py-2 bg-zinc-900/80 hover:bg-zinc-900 backdrop-blur text-sm rounded-lg border border-zinc-700">Fullscreen</button>
            </div>
        </div>
    </div>

    <!-- Phone / Sender Interface -->
    <div id="sender-screen" class="hidden flex-1 flex flex-col p-4 space-y-4">
        <div id="sender-setup" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 flex flex-col space-y-4">
            <h2 class="text-lg font-semibold text-center">Connect to PC</h2>
            <div id="qr-reader" class="overflow-hidden rounded-xl border border-zinc-800 bg-black min-h-[250px]"></div>
            <button id="start-scan-btn" onclick="startQRScanner()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-750 font-medium rounded-xl border border-zinc-700 transition shadow-lg">Scan PC QR Code</button>
            <p id="sender-status" class="text-sm text-zinc-400 text-center">Ready to pair.</p>
        </div>

        <div id="sender-controls" class="hidden flex-1 flex flex-col space-y-4">
            <div class="relative flex-1 bg-black rounded-2xl overflow-hidden border border-zinc-800 min-h-[300px] shadow-lg">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
                <div id="camera-toast" class="absolute top-4 left-1/2 -translate-x-1/2 px-4 py-2 bg-zinc-900/90 backdrop-blur border border-zinc-700 text-xs font-semibold tracking-wide rounded-full opacity-0 transition-opacity duration-300 pointer-events-none"></div>
            </div>
            <div class="flex gap-3">
                <button onclick="cycleCamera()" class="flex-1 py-3.5 bg-zinc-800 hover:bg-zinc-750 font-semibold rounded-xl border border-zinc-700 transition flex items-center justify-center gap-2 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    Switch
                </button>
                <div id="conn-indicator" class="px-4 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center text-xs text-red-400 font-mono shadow-lg">DISCONNECTED</div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://twenty-json.lovable.app/p/";
        let sessionId = "";
        let pc = null;
        let localStream = null;
        let currentCameraIndex = 0;
        let videoDevices = [];
        let qrScanner = null;
        const ICE_LIMIT = 6; // Limit candidates to speed up connection

        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        // --- Core Helpers & UI ---
        function showScreen(screenId) {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function showMessage(msg) {
            document.getElementById('message-box-text').innerText = msg;
            document.getElementById('message-box').classList.remove('hidden');
        }

        function closeMessageBox() {
            document.getElementById('message-box').classList.add('hidden');
        }

        function generateUUID() {
            return 'forge-xxxx-4xxx-yxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // --- Receiver Logic (PC) ---
        async function initReceiver() {
            showScreen('receiver-screen');
            sessionId = generateUUID();
            document.getElementById('session-id-display').innerText = sessionId;

            // Generate QR string with just the unique session identifier
            new QRCode(document.getElementById("qrcode"), { text: sessionId, width: 200, height: 200 });

            pc = new RTCPeerConnection(rtcConfig);
            
            pc.ontrack = (event) => {
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('remote-video').srcObject = event.streams[0];
                document.getElementById('receiver-status').innerText = "Streaming Active";
                document.getElementById('receiver-status').classList.remove('animate-pulse');
            };

            let iceCount = 0;
            let offerSent = false;

            // Function to push offer once conditions are met
            const sendOffer = async () => {
                if (offerSent) return;
                offerSent = true;
                document.getElementById('receiver-status').innerText = "Ready! Scan QR code with your phone.";
                try {
                    await fetch(`${BASE_URL}${sessionId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ offer: pc.localDescription })
                    });
                } catch (err) {
                    showMessage("Failed to upload signaling offer to network.");
                }
            };

            // Trigger on finding candidate, cutoff at ICE_LIMIT
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCount++;
                    if (iceCount >= ICE_LIMIT) sendOffer();
                }
            };

            // Fallback if gathering completes before hitting limit
            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') sendOffer();
            };

            // Add an empty audio/video transceiver to receive tracks from the phone
            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
        }

        async function checkForAnswer() {
            const btn = document.getElementById('check-answer-btn');
            btn.disabled = true;
            try {
                const res = await fetch(`${BASE_URL}${sessionId}`);
                if (!res.ok) throw new Error("No payload found yet.");
                const data = await res.json();
                
                if (data.answer) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('receiver-setup').classList.add('hidden');
                } else {
                    showMessage("Phone has not submitted the handshake answer yet. Ensure it scanned successfully.");
                }
            } catch (err) {
                showMessage("Handshake not found or expired. Make sure the phone has scanned the QR code and connected.");
            } finally {
                btn.disabled = false;
            }
        }

        function toggleFullscreen() {
            const video = document.getElementById('remote-video');
            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(err => showMessage("Fullscreen failed: " + err.message));
            } else {
                document.exitFullscreen();
            }
        }

        // --- Sender Logic (Phone) ---
        async function initSender() {
            showScreen('sender-screen');
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                if (videoDevices.length === 0) throw new Error("No cameras found");
            } catch (e) {
                document.getElementById('sender-status').innerText = "Camera access denied or unavailable.";
                showMessage("Please ensure camera permissions are granted for this site.");
            }
        }

        function startQRScanner() {
            document.getElementById('start-scan-btn').classList.add('hidden');
            qrScanner = new Html5Qrcode("qr-reader");
            qrScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                async (decodedText) => {
                    sessionId = decodedText;
                    document.getElementById('sender-status').innerText = "Connecting to session...";
                    qrScanner.stop();
                    document.getElementById('sender-setup').classList.add('hidden');
                    document.getElementById('sender-controls').classList.remove('hidden');
                    await connectToReceiver();
                },
                () => {} // Quiet failure for frame-by-frame scans
            ).catch(err => {
                showMessage("Camera initiation failed: " + err);
                document.getElementById('start-scan-btn').classList.remove('hidden');
            });
        }

        async function connectToReceiver() {
            let res, data;
            try {
                res = await fetch(`${BASE_URL}${sessionId}`);
                data = await res.json();
            } catch (e) {
                showMessage("Failed to fetch session. The PC session may have expired.");
                return;
            }
            
            if (!data.offer) {
                showMessage("Invalid or expired session offer. Please refresh PC page.");
                return;
            }

            pc = new RTCPeerConnection(rtcConfig);
            
            // Acquire primary camera track
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: videoDevices[currentCameraIndex]?.deviceId ? { exact: videoDevices[currentCameraIndex].deviceId } : undefined },
                    audio: false
                });
            } catch (e) {
                showMessage("Could not access camera for streaming.");
                return;
            }
            
            document.getElementById('local-video').srcObject = localStream;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            let iceCount = 0;
            let answerSent = false;

            const sendAnswer = async () => {
                if (answerSent) return;
                answerSent = true;
                try {
                    await fetch(`${BASE_URL}${sessionId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ answer: pc.localDescription })
                    });
                    document.getElementById('conn-indicator').innerText = "LIVE SIGNAL PUSHED";
                    document.getElementById('conn-indicator').className = "px-4 bg-emerald-950 border border-emerald-800 rounded-xl flex items-center justify-center text-xs text-emerald-400 font-mono font-bold shadow-lg";
                } catch (e) {
                    showMessage("Failed to upload signaling answer.");
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCount++;
                    if (iceCount >= ICE_LIMIT) sendAnswer();
                }
            };

            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') sendAnswer();
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
        }

        // --- Hot-swapping Track Logic ---
        async function cycleCamera() {
            if (videoDevices.length <= 1) {
                showMessage("Only one camera detected on this device.");
                return;
            }
            
            currentCameraIndex = (currentCameraIndex + 1) % videoDevices.length;
            const targetDevice = videoDevices[currentCameraIndex];

            // Brief non-intrusive UI flash displaying current device name
            const toast = document.getElementById('camera-toast');
            toast.innerText = targetDevice.label || `Camera ${currentCameraIndex + 1}`;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);

            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: targetDevice.deviceId } },
                    audio: false
                });

                const newVideoTrack = newStream.getVideoTracks()[0];
                const videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                
                if (videoSender) {
                    // Hot swap the live track directly inside the established PeerConnection
                    await videoSender.replaceTrack(newVideoTrack);
                }

                // Clean up the previous track locally
                localStream.getVideoTracks().forEach(t => t.stop());
                localStream = newStream;
                document.getElementById('local-video').srcObject = localStream;
            } catch (err) {
                showMessage("Failed to switch camera: " + err.message);
                // Revert index on failure
                currentCameraIndex = (currentCameraIndex - 1 + videoDevices.length) % videoDevices.length;
            }
        }
    </script>
</body>
</html>
