<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge WebRTC Camera Feeder</title>
    <!-- Tailwind CSS for clean layout styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QR Code Generation and Scanning Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Hidden UI style for clean OBS capture in fullscreen */
        .no-controls::-webkit-media-controls { display: none !important; }
        :fullscreen .fullscreen-hide { display: none !important; }
        :-webkit-full-screen .fullscreen-hide { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-[100dvh] w-screen overflow-hidden flex flex-col font-sans">

    <!-- Custom Message Box to replace native alerts -->
    <div id="message-box" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/80 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-sm w-full mx-4 shadow-2xl flex flex-col space-y-4 text-center">
            <h3 class="text-xl font-bold text-amber-500">Notice</h3>
            <p id="message-box-text" class="text-zinc-300 text-sm"></p>
            <button onclick="closeMessageBox()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 font-semibold rounded-xl border border-zinc-600 transition">OK</button>
        </div>
    </div>

    <!-- Role Selection Screen -->
    <div id="role-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">
        <h1 class="text-3xl font-bold tracking-tight text-amber-500 text-center">WebRTC Camera Feeder <span id="version-display" class="text-sm font-normal text-zinc-500 ml-2"></span></h1>
        <p class="text-zinc-400 text-center max-w-sm text-sm">Select the role for this device to establish the video stream proxy.</p>
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-sm">
            <button onclick="initReceiver()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-750 rounded-xl font-semibold border border-zinc-700 transition shadow-lg">PC / Receiver</button>
            <button onclick="initSender()" class="flex-1 py-4 bg-amber-600 hover:bg-amber-500 text-black rounded-xl font-semibold transition shadow-lg">Phone / Sender</button>
        </div>
    </div>

    <!-- PC / Receiver Interface -->
    <div id="receiver-screen" class="hidden flex-1 flex flex-col p-6 max-w-4xl mx-auto w-full space-y-6">
        <div id="receiver-setup" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 flex flex-col items-center space-y-4 shadow-xl">
            <h2 class="text-xl font-semibold">Scan to Link Camera</h2>
            <div id="qrcode" class="p-3 bg-white rounded-xl"></div>
            <p class="text-xs text-zinc-500 text-center">Session ID: <span id="session-id-display" class="font-mono text-zinc-300">Generating...</span></p>
            <button id="check-answer-btn" onclick="checkForAnswer()" class="px-6 py-2.5 bg-amber-600 hover:bg-amber-500 text-black font-medium rounded-lg transition shadow-lg disabled:opacity-50">Check for Phone Connection</button>
            <p id="receiver-status" class="text-sm text-zinc-400 animate-pulse">Waiting for network candidate aggregation...</p>
        </div>

        <div id="video-container" class="hidden relative bg-black aspect-video rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl group">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover no-controls"></video>
            <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity z-10 fullscreen-hide">
                <button onclick="disconnectSession()" class="px-4 py-2 bg-red-900/80 hover:bg-red-900 backdrop-blur text-sm rounded-lg border border-red-700 shadow-lg text-white">Disconnect</button>
            </div>
            <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity fullscreen-hide">
                <button onclick="toggleFullscreen()" class="px-4 py-2 bg-zinc-900/80 hover:bg-zinc-900 backdrop-blur text-sm rounded-lg border border-zinc-700">Fullscreen</button>
            </div>
        </div>
    </div>

    <!-- Phone / Sender Interface -->
    <div id="sender-screen" class="hidden flex-1 flex flex-col p-4 space-y-4 overflow-hidden">
        <div id="sender-setup" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 flex flex-col space-y-4 shrink-0">
            <h2 class="text-lg font-semibold text-center">Connect to PC</h2>
            <div id="qr-reader" class="overflow-hidden rounded-xl border border-zinc-800 bg-black max-h-[40vh]"></div>
            <button id="start-scan-btn" onclick="startQRScanner()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-750 font-medium rounded-xl border border-zinc-700 transition shadow-lg">Scan PC QR Code</button>
            <p id="sender-status" class="text-sm text-zinc-400 text-center">Ready to pair.</p>
        </div>

        <div id="sender-controls" class="hidden flex-1 flex flex-col space-y-4 min-h-0">
            <div id="sender-video-container" class="relative flex-1 bg-black rounded-2xl overflow-hidden border border-zinc-800 shadow-lg min-h-0 group">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
                <div id="camera-toast" class="absolute top-4 left-1/2 -translate-x-1/2 px-4 py-2 bg-zinc-900/90 backdrop-blur border border-zinc-700 text-xs font-semibold tracking-wide rounded-full opacity-0 transition-opacity duration-300 pointer-events-none"></div>
                <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity fullscreen-hide">
                    <button onclick="toggleSenderFullscreen()" class="px-4 py-2 bg-zinc-900/80 hover:bg-zinc-900 backdrop-blur text-sm rounded-lg border border-zinc-700 shadow-lg">Fullscreen</button>
                </div>
            </div>
            <div class="flex gap-3 shrink-0">
                <select id="camera-select" onchange="switchCamera(this.value)" class="flex-1 py-3.5 px-3 bg-zinc-800 hover:bg-zinc-750 font-semibold rounded-xl border border-zinc-700 transition shadow-lg appearance-none text-center focus:outline-none focus:border-amber-500 cursor-pointer text-sm overflow-hidden text-ellipsis">
                    <option value="">Loading Cameras...</option>
                </select>
                <button onclick="disconnectSession()" class="py-3.5 px-4 bg-red-900/50 hover:bg-red-800 font-semibold rounded-xl border border-red-700 transition flex items-center justify-center shadow-lg text-red-100" title="Disconnect">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                </button>
                <div id="conn-indicator" class="px-4 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center text-xs text-red-400 font-mono shadow-lg">DISCONNECTED</div>
            </div>
        </div>
    </div>

    <script>
        const TOOL_VERSION = "1.1.0";
        const BASE_URL = "https://twenty-json.lovable.app/p/";
        let sessionId = "";
        let pc = null;
        let localStream = null;
        let videoDevices = [];
        let qrScanner = null;
        const ICE_LIMIT = 6; // Limit candidates to speed up connection
        let wakeLock = null; // Wake Lock reference

        // Pinch-to-zoom variables
        let currentZoom = 1;
        let minZoom = 1;
        let maxZoom = 1;
        let stepZoom = 0.1;
        let initialPinchDistance = 0;

        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        // --- Core Helpers & UI ---
        
        async function applyHighQualityVideoParameters(pc) {
            const videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
            if (videoSender) {
                const params = videoSender.getParameters();
                if (!params.encodings) params.encodings = [{}];
                else if (params.encodings.length === 0) params.encodings.push({});
                
                // Max out bitrate for high fidelity local network streaming (50 Mbps)
                params.encodings[0].maxBitrate = 50000000;
                // Instruct WebRTC engine to prioritize crispness over smooth frame drops
                params.degradationPreference = 'maintain-resolution';
                
                try {
                    await videoSender.setParameters(params);
                } catch (e) {
                    console.warn("Advanced video params not supported by browser", e);
                }
            }
        }

        function showScreen(screenId) {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function showMessage(msg) {
            document.getElementById('message-box-text').innerText = msg;
            document.getElementById('message-box').classList.remove('hidden');
        }

        function closeMessageBox() {
            document.getElementById('message-box').classList.add('hidden');
        }

        function generateUUID() {
            return 'forge-xxxx-4xxx-yxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // --- Wake Lock & Disconnect Logic ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn("Wake lock failed:", err);
                }
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        function disconnectSession() {
            // Cut streams and free hardware lock
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            if (qrScanner) {
                try { qrScanner.stop(); } catch(e){}
            }
            if (wakeLock) {
                wakeLock.release().then(() => wakeLock = null).catch(()=>{});
            }
            
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            
            // Reset UI states
            document.getElementById('sender-controls').classList.add('hidden');
            document.getElementById('sender-setup').classList.remove('hidden');
            document.getElementById('video-container').classList.add('hidden');
            document.getElementById('receiver-setup').classList.remove('hidden');
            document.getElementById('start-scan-btn').classList.remove('hidden');
            document.getElementById('conn-indicator').innerText = "DISCONNECTED";
            document.getElementById('conn-indicator').className = "px-4 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center text-xs text-red-400 font-mono shadow-lg";
            document.getElementById('receiver-status').innerText = "Waiting for network candidate aggregation...";
            document.getElementById('receiver-status').classList.add('animate-pulse');
            
            showScreen('role-screen');
        }

        // --- Receiver Logic (PC) ---
        async function initReceiver() {
            showScreen('receiver-screen');
            await requestWakeLock();
            sessionId = generateUUID();
            document.getElementById('session-id-display').innerText = sessionId;

            // Generate QR string with just the unique session identifier
            new QRCode(document.getElementById("qrcode"), { text: sessionId, width: 200, height: 200 });

            pc = new RTCPeerConnection(rtcConfig);
            
            pc.ontrack = (event) => {
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('remote-video').srcObject = event.streams[0];
                document.getElementById('receiver-status').innerText = "Streaming Active";
                document.getElementById('receiver-status').classList.remove('animate-pulse');
            };

            let iceCount = 0;
            let offerSent = false;

            // Function to push offer once conditions are met
            const sendOffer = async () => {
                if (offerSent) return;
                offerSent = true;
                document.getElementById('receiver-status').innerText = "Ready! Scan QR code with your phone.";
                try {
                    await fetch(`${BASE_URL}${sessionId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ offer: pc.localDescription })
                    });
                } catch (err) {
                    showMessage("Failed to upload signaling offer to network.");
                }
            };

            // Trigger on finding candidate, cutoff at ICE_LIMIT
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCount++;
                    if (iceCount >= ICE_LIMIT) sendOffer();
                }
            };

            // Fallback if gathering completes before hitting limit
            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') sendOffer();
            };

            // Add an empty audio/video transceiver to receive tracks from the phone
            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
        }

        async function checkForAnswer() {
            const btn = document.getElementById('check-answer-btn');
            btn.disabled = true;
            try {
                const res = await fetch(`${BASE_URL}${sessionId}`);
                if (!res.ok) throw new Error("No payload found yet.");
                const data = await res.json();
                
                if (data.answer) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('receiver-setup').classList.add('hidden');
                } else {
                    showMessage("Phone has not submitted the handshake answer yet. Ensure it scanned successfully.");
                }
            } catch (err) {
                showMessage("Handshake not found or expired. Make sure the phone has scanned the QR code and connected.");
            } finally {
                btn.disabled = false;
            }
        }

        function toggleFullscreen() {
            const video = document.getElementById('remote-video');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (video.requestFullscreen) {
                    video.requestFullscreen().catch(err => showMessage("Fullscreen failed: " + err.message));
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen(); // iOS fallback
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        function toggleSenderFullscreen() {
            const container = document.getElementById('sender-video-container');
            const video = document.getElementById('local-video');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(err => showMessage("Fullscreen failed: " + err.message));
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen(); // iOS Safari constraint fallback
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // --- Pinch-to-Zoom Logic ---
        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('version-display').innerText = `v${TOOL_VERSION}`;
            const videoElem = document.getElementById('sender-video-container');
            
            // Capture initial pinch distance
            videoElem.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    initialPinchDistance = getDistance(e.touches);
                }
            }, { passive: false });

            // Calculate active pinch scale
            videoElem.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && maxZoom > minZoom) {
                    e.preventDefault(); // Prevent standard browser scroll/zoom
                    const newDistance = getDistance(e.touches);
                    const delta = newDistance - initialPinchDistance;
                    
                    const zoomChange = (delta / 100) * stepZoom; 
                    let newZoom = currentZoom + zoomChange;
                    newZoom = Math.max(minZoom, Math.min(newZoom, maxZoom));

                    if (Math.abs(newZoom - currentZoom) > (stepZoom * 0.1)) {
                        currentZoom = newZoom;
                        initialPinchDistance = newDistance; 
                        
                        if (localStream) {
                            const track = localStream.getVideoTracks()[0];
                            track.applyConstraints({ advanced: [{ zoom: currentZoom }] }).catch(err => console.warn(err));
                        }
                    }
                }
            }, { passive: false });
        });

        function setupZoom(track) {
            const caps = track.getCapabilities();
            const settings = track.getSettings();
            if (caps.zoom) {
                minZoom = caps.zoom.min || 1;
                maxZoom = caps.zoom.max || 10;
                stepZoom = caps.zoom.step || 0.1;
                currentZoom = settings.zoom || minZoom;
            } else {
                maxZoom = minZoom = 1;
            }
        }

        // --- Sender Logic (Phone) ---
        async function initSender() {
            showScreen('sender-screen');
            await requestWakeLock();
            try {
                // Request a dummy stream FIRST to force the browser to bypass privacy filters and reveal actual hardware labels & secondary lenses
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                // Stop dummy stream immediately
                tempStream.getTracks().forEach(t => t.stop());

                if (videoDevices.length === 0) throw new Error("No cameras found");

                // Populate Dropdown
                const select = document.getElementById('camera-select');
                select.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    select.appendChild(option);
                });
            } catch (e) {
                document.getElementById('sender-status').innerText = "Camera access denied or unavailable.";
                showMessage("Please ensure camera permissions are granted for this site to detect your lenses.");
            }
        }

        function startQRScanner() {
            document.getElementById('start-scan-btn').classList.add('hidden');
            qrScanner = new Html5Qrcode("qr-reader");
            qrScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                async (decodedText) => {
                    sessionId = decodedText;
                    document.getElementById('sender-status').innerText = "Connecting to session...";
                    qrScanner.stop();
                    document.getElementById('sender-setup').classList.add('hidden');
                    document.getElementById('sender-controls').classList.remove('hidden');
                    await connectToReceiver();
                },
                () => {} // Quiet failure for frame-by-frame scans
            ).catch(err => {
                showMessage("Camera initiation failed: " + err);
                document.getElementById('start-scan-btn').classList.remove('hidden');
            });
        }

        async function connectToReceiver() {
            let res, data;
            try {
                res = await fetch(`${BASE_URL}${sessionId}`);
                data = await res.json();
            } catch (e) {
                showMessage("Failed to fetch session. The PC session may have expired.");
                return;
            }
            
            if (!data.offer) {
                showMessage("Invalid or expired session offer. Please refresh PC page.");
                return;
            }

            pc = new RTCPeerConnection(rtcConfig);
            
            // Acquire primary camera track, forcing highest fidelity constraints natively available
            try {
                const selectedDeviceId = document.getElementById('camera-select').value;
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        deviceId: selectedDeviceId ? { exact: selectedDeviceId } : undefined,
                        width: { ideal: 3840 }, 
                        height: { ideal: 2160 } 
                    },
                    audio: false
                });
            } catch (e) {
                showMessage("Could not access camera for streaming.");
                return;
            }
            
            setupZoom(localStream.getVideoTracks()[0]);
            document.getElementById('local-video').srcObject = localStream;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // Enforce max fidelity right after track is bound
            await applyHighQualityVideoParameters(pc);

            let iceCount = 0;
            let answerSent = false;

            const sendAnswer = async () => {
                if (answerSent) return;
                answerSent = true;
                try {
                    await fetch(`${BASE_URL}${sessionId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ answer: pc.localDescription })
                    });
                    document.getElementById('conn-indicator').innerText = "LIVE SIGNAL PUSHED";
                    document.getElementById('conn-indicator').className = "px-4 bg-emerald-950 border border-emerald-800 rounded-xl flex items-center justify-center text-xs text-emerald-400 font-mono font-bold shadow-lg";
                } catch (e) {
                    showMessage("Failed to upload signaling answer.");
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCount++;
                    if (iceCount >= ICE_LIMIT) sendAnswer();
                }
            };

            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') sendAnswer();
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
        }

        // --- Hot-swapping Track Logic ---
        async function switchCamera(deviceId) {
            if (!deviceId) return;

            // Brief non-intrusive UI flash displaying switch action
            const toast = document.getElementById('camera-toast');
            const selectedOption = document.querySelector(`#camera-select option[value="${deviceId}"]`);
            toast.innerText = selectedOption ? selectedOption.text : "Switching Camera...";
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);

            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        deviceId: { exact: deviceId },
                        width: { ideal: 3840 }, 
                        height: { ideal: 2160 } 
                    },
                    audio: false
                });

                const newVideoTrack = newStream.getVideoTracks()[0];
                setupZoom(newVideoTrack);

                if (pc) {
                    const videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (videoSender) {
                        // Hot swap the live track directly inside the established PeerConnection
                        await videoSender.replaceTrack(newVideoTrack);
                        // Re-enforce quality constraints on the new track
                        await applyHighQualityVideoParameters(pc);
                    }
                }

                // Clean up the previous track locally
                if (localStream) {
                    localStream.getVideoTracks().forEach(t => t.stop());
                }
                localStream = newStream;
                document.getElementById('local-video').srcObject = localStream;
            } catch (err) {
                showMessage("Failed to switch camera: " + err.message);
                // Try to revert dropdown to actual active device on fail
                if (localStream && localStream.getVideoTracks().length > 0) {
                     const currentId = localStream.getVideoTracks()[0].getSettings().deviceId;
                     if(currentId) document.getElementById('camera-select').value = currentId;
                }
            }
        }
    </script>
</body>
</html>
