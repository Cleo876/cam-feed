<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge WebRTC Camera Feeder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Hidden UI style for clean OBS capture and fullscreen management */
        .no-controls::-webkit-media-controls { display: none !important; }
        :fullscreen .controls-overlay { display: none !important; }
        :-webkit-full-screen .controls-overlay { display: none !important; }
        
        /* Force dropdown to show arrow */
        select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%23a1a1aa' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E"); background-position: right .5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-[100dvh] w-screen overflow-hidden flex flex-col font-sans">

    <!-- Role Selection Screen -->
    <div id="role-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">
        <h1 class="text-3xl font-bold tracking-tight text-amber-500 text-center">WebRTC Camera Feeder <span class="text-sm font-normal text-zinc-500 align-top" id="version-display">v1.1.2</span></h1>
        <p class="text-zinc-400 text-center max-w-sm text-sm">Select the role for this device to establish the high-fidelity video proxy.</p>
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-sm">
            <button onclick="initReceiver()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-750 rounded-xl font-semibold border border-zinc-700 shadow-lg transition">💻 PC / Receiver</button>
            <button onclick="initSender()" class="flex-1 py-4 bg-amber-600 hover:bg-amber-500 text-black rounded-xl font-semibold shadow-lg transition">📱 Phone / Sender</button>
        </div>
    </div>

    <!-- PC / Receiver Interface -->
    <div id="receiver-screen" class="hidden flex-1 flex flex-col p-6 max-w-4xl mx-auto w-full space-y-4 min-h-0 relative">
        <div id="receiver-setup" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 flex flex-col items-center space-y-4 shadow-xl shrink-0">
            <h2 class="text-xl font-semibold">Scan to Link Camera</h2>
            <div id="qrcode" class="p-3 bg-white rounded-xl shadow-inner"></div>
            <p class="text-xs text-zinc-500 text-center">Session ID: <span id="session-id-display" class="font-mono text-zinc-300">Generating...</span></p>
            <button id="check-answer-btn" onclick="checkForAnswer()" class="px-6 py-2.5 bg-amber-600 hover:bg-amber-500 text-black font-medium rounded-lg transition shadow-lg disabled:opacity-50">Check for Phone Connection</button>
            <p id="receiver-status" class="text-sm text-zinc-400 animate-pulse">Waiting for network candidate aggregation...</p>
        </div>

        <div id="video-container" class="hidden relative bg-black rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl group flex-1 min-h-0">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-contain no-controls"></video>
            
            <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity z-10 controls-overlay">
                <button onclick="disconnectSession()" class="px-4 py-2 bg-red-900/80 hover:bg-red-900 backdrop-blur text-sm rounded-lg border border-red-700 shadow-lg text-white transition-colors">Disconnect</button>
            </div>
            <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity z-10 controls-overlay">
                <button onclick="toggleFullscreen('video-container')" class="px-4 py-2 bg-zinc-900/80 hover:bg-zinc-900 backdrop-blur text-sm rounded-lg border border-zinc-700 shadow-lg transition-colors">Fullscreen</button>
            </div>
        </div>
    </div>

    <!-- Phone / Sender Interface -->
    <div id="sender-screen" class="hidden flex-1 flex flex-col p-4 space-y-4 min-h-0 relative">
        <div id="sender-setup" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 flex flex-col space-y-4 shrink-0 shadow-xl">
            <h2 class="text-lg font-semibold text-center">Connect to PC</h2>
            <div id="qr-reader" class="overflow-hidden rounded-xl border border-zinc-800 bg-black shadow-inner"></div>
            <button id="start-scan-btn" onclick="startQRScanner()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-750 font-medium rounded-xl border border-zinc-700 shadow-lg transition">Scan PC QR Code</button>
            <p id="sender-status" class="text-sm text-zinc-400 text-center">Ready to pair.</p>
        </div>

        <div id="sender-controls" class="hidden flex-1 flex flex-col space-y-4 min-h-0">
            <div id="phone-video-container" class="relative flex-1 bg-black rounded-2xl overflow-hidden border border-zinc-800 min-h-0 shadow-2xl group">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-contain"></video>
                <div class="absolute bottom-4 right-4 z-10 opacity-60 hover:opacity-100 transition-opacity">
                    <button onclick="toggleFullscreen('phone-video-container')" class="px-3 py-2 bg-zinc-900/80 backdrop-blur text-xs rounded-lg border border-zinc-700 shadow-lg text-white">Toggle Fullscreen</button>
                </div>
            </div>
            <div class="flex gap-3 shrink-0">
                <select id="camera-select" onchange="switchCamera(this.value)" class="flex-1 py-3.5 px-3 bg-zinc-800 hover:bg-zinc-750 font-semibold rounded-xl border border-zinc-700 transition shadow-lg appearance-none text-center focus:outline-none focus:border-amber-500 cursor-pointer text-sm overflow-hidden text-ellipsis">
                    <option value="">Loading Cameras...</option>
                </select>
                <button onclick="disconnectSession()" class="px-4 py-3.5 bg-red-900/80 hover:bg-red-900 font-semibold rounded-xl border border-red-700 shadow-lg transition text-sm">End</button>
            </div>
        </div>
    </div>

    <!-- Custom Message Box -->
    <div id="msg-box" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl flex flex-col space-y-4 transform transition-all">
            <h3 class="text-lg font-bold text-amber-500 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Notice
            </h3>
            <p id="msg-text" class="text-zinc-300 text-sm leading-relaxed"></p>
            <button onclick="closeMessage()" class="w-full py-2.5 bg-zinc-800 hover:bg-zinc-750 font-semibold rounded-xl border border-zinc-700 transition shadow-lg">Acknowledge</button>
        </div>
    </div>

    <script>
        const TOOL_VERSION = "1.1.2";
        const BASE_URL = "https://twenty-json.lovable.app/p/";
        
        let sessionId = "";
        let pc = null;
        let localStream = null;
        let videoDevices = [];
        let qrScanner = null;
        let wakeLock = null;
        
        // WebRTC Optimization States
        let iceCount = 0;
        const ICE_LIMIT = 6; 
        
        // Zoom Optimization States
        let initialPinchDistance = null;
        let baseZoom = 1;
        let lastZoomTime = 0;
        const ZOOM_THROTTLE_MS = 60; // Max ~16 zoom requests per second

        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        document.getElementById('version-display').innerText = `v${TOOL_VERSION}`;

        function showScreen(screenId) {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
            requestWakeLock();
        }

        function generateUUID() {
            return 'forge-xxxx-4xxx-yxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function showMessage(msg) {
            document.getElementById('msg-text').innerText = msg;
            document.getElementById('msg-box').classList.remove('hidden');
            document.getElementById('msg-box').classList.add('flex');
        }

        function closeMessage() {
            document.getElementById('msg-box').classList.add('hidden');
            document.getElementById('msg-box').classList.remove('flex');
        }

        function toggleFullscreen(containerId) {
            const container = document.getElementById(containerId);
            const video = container.querySelector('video');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(err => showMessage(err.message));
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (video && video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Screen Wake Lock released');
                    });
                }
            } catch (err) {
                console.warn(`WakeLock Error: ${err.name}, ${err.message}`);
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        async function applyHighQualityVideoParameters(peerConnection) {
            const senders = peerConnection.getSenders();
            const videoSender = senders.find(s => s.track && s.track.kind === 'video');
            if (videoSender) {
                const params = videoSender.getParameters();
                if (!params.encodings) params.encodings = [{}];
                
                params.encodings[0].maxBitrate = 50000000; // 50 Mbps local cap
                params.degradationPreference = 'maintain-resolution';
                
                try {
                    await videoSender.setParameters(params);
                } catch (e) {
                    console.warn("Browser rejected strict quality parameters. Falling back to default heuristics.");
                }
            }
        }

        function setupZoom(track) {
            const capabilities = track.getCapabilities();
            if (!capabilities.zoom) return;

            const videoEl = document.getElementById('local-video');
            // Clone and replace element to securely wipe old EventListeners when switching cameras
            const newVideoEl = videoEl.cloneNode(true);
            videoEl.parentNode.replaceChild(newVideoEl, videoEl);
            
            // Reattach the feed
            const targetEl = document.getElementById('local-video');
            targetEl.srcObject = localStream;

            targetEl.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    initialPinchDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const settings = track.getSettings();
                    baseZoom = settings.zoom || 1;
                }
            });

            targetEl.addEventListener('touchmove', async (e) => {
                if (e.touches.length === 2 && initialPinchDistance) {
                    e.preventDefault(); // Stop native page scrolling/zooming
                    
                    const now = Date.now();
                    if (now - lastZoomTime < ZOOM_THROTTLE_MS) return;
                    lastZoomTime = now;

                    const currentDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    
                    const scale = currentDistance / initialPinchDistance;
                    let newZoom = baseZoom * scale;
                    newZoom = Math.max(capabilities.zoom.min, Math.min(capabilities.zoom.max, newZoom));
                    
                    try {
                        await track.applyConstraints({ advanced: [{ zoom: newZoom }] });
                    } catch (err) {} // Fail quietly for unfulfilled mid-zoom promises
                }
            }, { passive: false });
        }

        async function initReceiver() {
            showScreen('receiver-screen');
            sessionId = generateUUID();
            document.getElementById('session-id-display').innerText = sessionId;
            new QRCode(document.getElementById("qrcode"), { text: sessionId, width: 200, height: 200 });

            pc = new RTCPeerConnection(rtcConfig);
            iceCount = 0;
            let offerPushed = false;
            
            pc.ontrack = (event) => {
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('remote-video').srcObject = event.streams[0];
                document.getElementById('receiver-status').innerText = "Streaming Active";
                document.getElementById('receiver-status').classList.remove('animate-pulse');
            };

            const pushOffer = async () => {
                if (offerPushed) return;
                offerPushed = true;
                document.getElementById('receiver-status').innerText = "Ready! Scan QR code with your phone.";
                await fetch(`${BASE_URL}${sessionId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ offer: pc.localDescription })
                });
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCount++;
                    if (iceCount >= ICE_LIMIT) pushOffer();
                }
            };
            
            pc.onicegatheringstatechange = async () => {
                if (pc.iceGatheringState === 'complete') pushOffer();
            };

            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
        }

        async function checkForAnswer() {
            const btn = document.getElementById('check-answer-btn');
            btn.disabled = true;
            btn.innerText = "Checking...";
            try {
                const res = await fetch(`${BASE_URL}${sessionId}`);
                if (!res.ok) throw new Error("No payload found yet.");
                const data = await res.json();
                
                if (data.answer) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('receiver-setup').classList.add('hidden');
                } else {
                    showMessage("Phone has not submitted the handshake answer yet.");
                }
            } catch (err) {
                showMessage("Handshake not found. Ensure phone has successfully scanned the QR.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Check for Phone Connection";
            }
        }

        async function initSender() {
            showScreen('sender-screen');
            try {
                // Dummy stream to forcefully unlock hardware IDs/Labels on strict browsers
                const dummyStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                dummyStream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                const select = document.getElementById('camera-select');
                select.innerHTML = '';
                videoDevices.forEach((device) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${select.options.length + 1}`;
                    select.appendChild(option);
                });
            } catch (e) {
                document.getElementById('sender-status').innerText = "Camera access denied.";
                showMessage("Please ensure camera permissions are granted for this site.");
            }
        }

        function startQRScanner() {
            document.getElementById('start-scan-btn').classList.add('hidden');
            qrScanner = new Html5Qrcode("qr-reader");
            qrScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                async (decodedText) => {
                    sessionId = decodedText;
                    document.getElementById('sender-status').innerText = "Connecting to session...";
                    
                    const qrVideo = document.querySelector('#qr-reader video');
                    if (qrVideo && qrVideo.srcObject) {
                        localStream = qrVideo.srcObject;
                        const track = localStream.getVideoTracks()[0];
                        
                        const activeDeviceId = track.getSettings().deviceId;
                        if (activeDeviceId) {
                            document.getElementById('camera-select').value = activeDeviceId;
                        }
                        
                        // Temporarily bypass lens shutdown for a seamless handover
                        const originalStop = track.stop.bind(track);
                        track.stop = () => { console.log('Seamless handover initialized.'); };
                        
                        await qrScanner.stop();
                        track.stop = originalStop;
                    } else {
                        await qrScanner.stop();
                    }
                    
                    document.getElementById('sender-setup').classList.add('hidden');
                    document.getElementById('sender-controls').classList.remove('hidden');
                    await connectToReceiver();
                },
                () => {} // Quiet failure for frame scans
            ).catch(err => {
                showMessage("Camera initiation failed: " + err);
                document.getElementById('start-scan-btn').classList.remove('hidden');
            });
        }

        async function connectToReceiver() {
            let res, data;
            try {
                res = await fetch(`${BASE_URL}${sessionId}`);
                data = await res.json();
            } catch(e) {
                showMessage("Failed to connect to signaling server.");
                return;
            }
            
            if (!data.offer) {
                showMessage("Invalid or expired session offer. Please refresh PC page.");
                return;
            }

            pc = new RTCPeerConnection(rtcConfig);
            
            if (!localStream) {
                try {
                    const selectedDeviceId = document.getElementById('camera-select').value;
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            deviceId: selectedDeviceId ? { exact: selectedDeviceId } : undefined,
                            width: { ideal: 3840 }, 
                            height: { ideal: 2160 } 
                        },
                        audio: false
                    });
                } catch (e) {
                    showMessage("Could not access camera for streaming.");
                    return;
                }
            } else {
                try {
                    const track = localStream.getVideoTracks()[0];
                    await track.applyConstraints({ width: { ideal: 3840 }, height: { ideal: 2160 } });
                } catch(e) {}
            }
            
            setupZoom(localStream.getVideoTracks()[0]);
            document.getElementById('local-video').srcObject = localStream;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            await applyHighQualityVideoParameters(pc);

            iceCount = 0;
            let answerSent = false;

            const pushAnswer = async () => {
                if (answerSent) return;
                answerSent = true;
                await fetch(`${BASE_URL}${sessionId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answer: pc.localDescription })
                });
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCount++;
                    if (iceCount >= ICE_LIMIT) pushAnswer();
                }
            };
            
            pc.onicegatheringstatechange = async () => {
                if (pc.iceGatheringState === 'complete') pushAnswer();
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
        }

        async function switchCamera(deviceId) {
            if (!deviceId) return;
            
            // Release the hardware lock first
            if (localStream) {
                localStream.getVideoTracks().forEach(t => t.stop());
            }

            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        deviceId: { exact: deviceId },
                        width: { ideal: 3840 }, 
                        height: { ideal: 2160 } 
                    },
                    audio: false
                });

                localStream = newStream;
                const newVideoTrack = localStream.getVideoTracks()[0];
                setupZoom(newVideoTrack);
                document.getElementById('local-video').srcObject = localStream;

                if (pc) {
                    const videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (videoSender) {
                        await videoSender.replaceTrack(newVideoTrack);
                        await applyHighQualityVideoParameters(pc);
                    }
                }
            } catch (e) {
                showMessage("Failed to switch hardware lens: " + e.message);
            }
        }

        function disconnectSession() {
            if (pc) {
                pc.close();
                pc = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (qrScanner && qrScanner.isScanning) {
                qrScanner.stop().catch(()=>{});
            }
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
            
            // Exit fullscreen safely if active
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }

            document.getElementById('receiver-screen').classList.add('hidden');
            document.getElementById('sender-screen').classList.add('hidden');
            document.getElementById('video-container').classList.add('hidden');
            document.getElementById('receiver-setup').classList.remove('hidden');
            document.getElementById('sender-setup').classList.remove('hidden');
            document.getElementById('sender-controls').classList.add('hidden');
            document.getElementById('start-scan-btn').classList.remove('hidden');
            document.getElementById('receiver-status').innerText = "Waiting for network candidate aggregation...";
            document.getElementById('receiver-status').classList.add('animate-pulse');
            
            showScreen('role-screen');
        }
    </script>
</body>
</html>
